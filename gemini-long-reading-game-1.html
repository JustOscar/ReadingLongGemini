<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reading Adventure! 🌟</title>
    <style>
        /* =========================================
           THEME & GLOBAL STYLES
           ========================================= */
        :root {
            --bg-color: #f0f8ff; /* Soft Alice Blue */
            --primary: #ff9a9e;
            --secondary: #a1c4fd;
            --success: #a8e6cf;
            --danger: #ffb7b2;
            --text-dark: #4a4e69;
            --font-main: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', sans-serif;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: var(--font-main);
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .hidden { display: none !important; }

        /* =========================================
           SCREENS
           ========================================= */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-color);
            transition: opacity 0.3s;
            z-index: 10;
        }

        #game-screen { z-index: 5; justify-content: flex-start; padding-top: 20px;}

        /* =========================================
           START & CELEBRATION SCREENS
           ========================================= */
        h1 { font-size: clamp(2.5rem, 6vw, 4rem); color: #ff6b6b; text-align: center; margin: 0 10px 30px; text-shadow: 2px 2px 0px #fff; }
        
        .big-btn {
            font-family: var(--font-main);
            font-size: 2rem;
            font-weight: bold;
            padding: 20px 50px;
            background: linear-gradient(135deg, #ffd166, #ff9f1c);
            color: #fff;
            border: none;
            border-radius: 40px;
            box-shadow: 0 8px 0px #e07a00;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .big-btn:active { transform: translateY(6px); box-shadow: 0 2px 0px #e07a00; }

        /* =========================================
           DASHBOARD (LEVEL SELECT)
           ========================================= */
        .level-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 800px;
            width: 90%;
        }
        .level-btn {
            background: #fff;
            border: 4px solid var(--secondary);
            border-radius: 25px;
            padding: 30px 10px;
            font-size: 1.5rem;
            font-family: var(--font-main);
            font-weight: bold;
            color: var(--text-dark);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            display: flex; flex-direction: column; align-items: center;
            transition: transform 0.2s;
        }
        .level-btn.locked {
            background: #e9ecef; border-color: #ced4da; color: #adb5bd; cursor: not-allowed;
        }
        .level-btn:not(.locked):active { transform: scale(0.95); }
        .level-icon { font-size: 3rem; margin-bottom: 10px; }

        /* =========================================
           MAIN GAME UI
           ========================================= */
        .top-bar {
            width: 95%; max-width: 800px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px;
        }
        .back-btn {
            background: #fff; border: 3px solid #ccc; border-radius: 15px;
            padding: 10px 20px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
        }
        
        /* Progress Tracker */
        .progress-container {
            display: flex; gap: 5px; flex-wrap: wrap; justify-content: center;
            background: #fff; padding: 10px 20px; border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            flex-grow: 1; margin-left: 15px;
        }
        .star { font-size: 1.5rem; color: #e9ecef; transition: color 0.3s; }
        .star.filled { color: #ffd166; text-shadow: 0 0 5px #ff9f1c; }

        /* Visual Display */
        .card-display {
            background: #fff;
            width: 90%; max-width: 500px;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            display: flex; flex-direction: column; align-items: center;
            padding: 30px 20px;
            margin-bottom: 25px;
        }
        .emoji-art { font-size: 8rem; margin: 0; line-height: 1; }
        .listen-btn {
            margin-top: 20px; background: var(--secondary); color: #fff;
            border: none; border-radius: 25px; padding: 10px 25px;
            font-size: 1.2rem; font-weight: bold; font-family: var(--font-main);
            box-shadow: 0 5px 0px #7b9acc; cursor: pointer;
        }
        .listen-btn:active { transform: translateY(4px); box-shadow: 0 1px 0px #7b9acc; }

        /* Options Grid */
        .options-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
            width: 95%; max-width: 800px; padding-bottom: 30px;
        }
        /* Level 6 Sentence Mode Overrides */
        .options-container.sentence-mode { grid-template-columns: 1fr; }
        
        .option-btn {
            background: #fff; border: 4px solid var(--secondary);
            border-radius: 25px; padding: 25px 15px;
            font-size: clamp(1.5rem, 4vw, 2.5rem); font-family: var(--font-main); font-weight: bold;
            color: var(--text-dark); box-shadow: 0 8px 0px var(--secondary);
            cursor: pointer; transition: all 0.1s;
        }
        .option-btn:active { transform: translateY(6px); box-shadow: 0 2px 0px var(--secondary); }
        .option-btn.correct { background: var(--success); border-color: #71dd8a; box-shadow: 0 8px 0px #71dd8a; color: #fff; }
        .option-btn.wrong { background: var(--danger); border-color: #ff8780; box-shadow: 0 8px 0px #ff8780; color: #fff; }

        /* =========================================
           ANIMATIONS
           ========================================= */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.3s ease-in-out; }
    </style>
</head>

    <div id="start-screen" class="screen">

        </div>

        <div class="options-container" id="options-grid">
            </div>
    </div>

            6: [ // Simple Sentences (200)

                // Expanded sentence list
                {w:"The elephant is huge.",e:"🐘"},{w:"I eat a sweet cookie.",e:"🍪"},{w:"The plane is in the sky.",e:"✈️"},{w:"We see a rainbow.",e:"🌈"},{w:"The rabbit hops away.",e:"🐰"},{w:"I put on my socks.",e:"🧦"},{w:"The horse runs fast.",e:"🐎"},{w:"We jump in the pool.",e:"🏊"},{w:"The spider spins a web.",e:"🕷️"},{w:"I read my book at night.",e:"📖"},
                {w:"The rocket goes to space.",e:"🚀"},{w:"We build a snowman.",e:"⛄"},{w:"The dinosaur is big.",e:"🦖"},{w:"I brush my teeth.",e:"🪥"},{w:"The boat floats on water.",e:"⛵"},{w:"We eat a hot dog.",e:"🌭"},{w:"The ghost is scary.",e:"👻"},{w:"I have a blue balloon.",e:"🎈"},{w:"The alien has green eyes.",e:"👽"},{w:"We open the present.",e:"🎁"},
                {w:"The castle has tall towers.",e:"🏰"},{w:"I look through the telescope.",e:"🔭"},{w:"The robot can walk.",e:"🤖"},{w:"We find the treasure.",e:"🏴‍☠️"},{w:"The princess wears a crown.",e:"👸"},{w:"I play the piano.",e:"🎹"},{w:"The helicopter flies up.",e:"🚁"},{w:"We watch television.",e:"📺"},{w:"The camera takes a photo.",e:"📷"},{w:"I open the door.",e:"🚪"}

                // The structure easily accepts more appended by the user script if desired!
            ]
        };

        /* =========================================
           2. GAME STATE & ENGINE
           ========================================= */
        const TARGET_SCORE = 20;
        let currentLevel = 1;
        let highestUnlocked = 1;
        let currentProgress = 0;
        let activeWord = null;
        let audioCtx = null;
        let voiceSynth = window.speechSynthesis;
        let chosenVoice = null;

        // UI Elements
        const screens = {
            start: document.getElementById('start-screen'),
            dashboard: document.getElementById('dashboard'),
            game: document.getElementById('game-screen'),
            celebration: document.getElementById('celebration-screen')
        };
        const levelGrid = document.getElementById('level-grid');
        const progressBar = document.getElementById('progress-bar');
        const emojiDisplay = document.getElementById('emoji-display');
        const optionsGrid = document.getElementById('options-grid');

        const levelNames = [
            "Level 1: Short Words", "Level 2: Blends", "Level 3: Magic E",
            "Level 4: Sight Words", "Level 5: Big Words", "Level 6: Sentences!"
        ];

        function initGame() {
            // Unlock Audio Context on first tap
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            // Setup Web Speech API Voice
            const voices = voiceSynth.getVoices();
            chosenVoice = voices.find(v => v.name.includes("Female") || v.name.includes("Samantha") || v.lang === "en-US") || voices[0];

            switchScreen('dashboard');
            renderDashboard();
        }

        function switchScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.add('hidden'));
            screens[screenName].classList.remove('hidden');
        }

        /* =========================================
           3. LEVEL SELECTION & PROGRESSION
           ========================================= */
        function renderDashboard() {
            levelGrid.innerHTML = '';
            for (let i = 1; i <= 6; i++) {
                const btn = document.createElement('div');
                const isLocked = i > highestUnlocked;
                
                btn.className = `level-btn ${isLocked ? 'locked' : ''}`;
                btn.innerHTML = `
                    <div class="level-icon">${isLocked ? '🔒' : (i===6 ? '📖' : '⭐')}</div>
                    <div>${levelNames[i-1]}</div>
                `;
                
                if (!isLocked) {
                    btn.onclick = () => startLevel(i);
                }
                levelGrid.appendChild(btn);
            }
        }

        function startLevel(levelId) {
            currentLevel = levelId;
            currentProgress = 0;
            
            // Layout adjustment for sentences (Level 6)
            if(currentLevel === 6) {
                optionsGrid.classList.add('sentence-mode');
            } else {
                optionsGrid.classList.remove('sentence-mode');
            }

            renderProgress();
            switchScreen('game');
            nextQuestion();
        }

        function renderProgress() {
            progressBar.innerHTML = '';
            for (let i = 0; i < TARGET_SCORE; i++) {
                const star = document.createElement('span');
                star.className = `star ${i < currentProgress ? 'filled' : ''}`;
                star.innerHTML = '★';
                progressBar.appendChild(star);
            }
        }

        /* =========================================
           4. CORE GAMEPLAY LOOP
           ========================================= */
        function nextQuestion() {
            const bank = gameData[currentLevel];
            
            // Pick a random target (avoiding immediate repeats)
            let newTarget;
            do {
                newTarget = bank[Math.floor(Math.random() * bank.length)];
            } while (activeWord && newTarget.w === activeWord.w);
            activeWord = newTarget;

            // Pick 3 distractors
            let pool = bank.filter(item => item.w !== activeWord.w);
            pool = pool.sort(() => 0.5 - Math.random());
            let distractors = pool.slice(0, 3);

            // Combine and shuffle options
            let options = [activeWord, ...distractors].sort(() => 0.5 - Math.random());

            // Render UI
            emojiDisplay.innerText = activeWord.e;
            optionsGrid.innerHTML = '';

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.w;
                btn.onclick = () => handleAnswer(btn, opt.w === activeWord.w);
                optionsGrid.appendChild(btn);
            });

            // Trigger Audio Instruction
            setTimeout(speakTarget, 300);
        }

        function handleAnswer(btnElement, isCorrect) {
            // Disable all buttons to prevent spam clicking
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);

            if (isCorrect) {
                playSuccessChime();
                btnElement.classList.add('correct');
                currentProgress++;
                renderProgress();

                if (currentProgress >= TARGET_SCORE) {
                    setTimeout(levelComplete, 1200);
                } else {
                    setTimeout(() => {
                        allBtns.forEach(b => b.disabled = false);
                        nextQuestion();
                    }, 1200);
                }
            } else {
                playFailBoop();
                btnElement.classList.add('wrong');
                btnElement.classList.add('shake');
                
                setTimeout(() => {
                    btnElement.classList.remove('wrong', 'shake');
                    allBtns.forEach(b => b.disabled = false); // Let them try again
                }, 600);
            }
        }

        function levelComplete() {
            if (currentLevel === highestUnlocked && highestUnlocked < 6) {
                highestUnlocked++;
            }
            switchScreen('celebration');
            playSuccessChime(true); // Epic chord
            generateConfetti();
        }

        function showDashboard() {
            voiceSynth.cancel();
            switchScreen('dashboard');
            renderDashboard();
        }

        /* =========================================
           5. AUDIO & TEXT-TO-SPEECH
           ========================================= */
        function speakTarget() {
            voiceSynth.cancel(); // Stop current speech
            const text = currentLevel === 6 ? 
                `Can you read this sentence? ${activeWord.w}` : 
                `Can you find the word... ${activeWord.w}?`;
            
            const utterance = new SpeechSynthesisUtterance(text);
            if(chosenVoice) utterance.voice = chosenVoice;
            utterance.rate = 0.85; // Slightly slower for kids
            utterance.pitch = 1.1; // Friendly pitch
            voiceSynth.speak(utterance);
        }

        function playSuccessChime(epic = false) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'sine';
            gain.connect(audioCtx.destination);
            osc.connect(gain);

            if (epic) {
                // Level complete arpeggio
                osc.frequency.setValueAtTime(523.25, now); // C5
                osc.frequency.setValueAtTime(659.25, now + 0.1); // E5
                osc.frequency.setValueAtTime(783.99, now + 0.2); // G5
                osc.frequency.setValueAtTime(1046.50, now + 0.3); // C6
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 1.5);
                osc.start(now); osc.stop(now + 1.5);
            } else {
                // Quick correct ding
                osc.frequency.setValueAtTime(659.25, now); // E5
                osc.frequency.setValueAtTime(880.00, now + 0.1); // A5
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            }
        }

        function playFailBoop() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'triangle';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.linearRampToValueAtTime(150, now + 0.2);

            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);

            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(now); osc.stop(now + 0.3);
        }

        /* =========================================
           6. VISUAL EFFECTS
           ========================================= */
        function generateConfetti() {
            const colors = ['#ff6b6b', '#fca311', '#a8e6cf', '#a1c4fd', '#ffb7b2'];
            for(let i=0; i<50; i++) {
                const conf = document.createElement('div');
                conf.style.position = 'absolute';
                conf.style.width = '15px'; conf.style.height = '15px';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = '-20px';
                conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                conf.style.zIndex = '9999';
                
                // Random physics
                const fallDuration = Math.random() * 3 + 2;
                const spinDuration = Math.random() * 2 + 1;
                conf.style.transition = `top ${fallDuration}s ease-in, transform ${spinDuration}s linear`;
                
                document.body.appendChild(conf);
                
                setTimeout(() => {
                    conf.style.top = '110vh';
                    conf.style.transform = `rotate(${Math.random() * 720}deg) translateX(${Math.random() * 100 - 50}px)`;
                }, 50);

                setTimeout(() => conf.remove(), fallDuration * 1000);
            }
        }
        
        // Handle voice loading quirks in some browsers
        window.speechSynthesis.onvoiceschanged = () => {
            const voices = voiceSynth.getVoices();
            chosenVoice = voices.find(v => v.name.includes("Female") || v.name.includes("Samantha") || v.lang === "en-US") || voices[0];
        };
    </script>
